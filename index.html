<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BrickSort 樂高收納</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-firestore-compat.min.js"></script>
<style>
:root{--bg:#0a0a0a;--surface:#131313;--card:#1a1a1a;--border:#262626;--accent:#f7c948;--accent-bg:rgba(247,201,72,.12);--accent-dim:rgba(247,201,72,.06);--text:#e8e8e8;--muted:#777;--dim:#444;--green:#22c55e;--green-bg:rgba(34,197,94,.12);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--orange:#f97316;--orange-bg:rgba(249,115,22,.12);--mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;font-size:15px}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.05em}
.back-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px 0;font-family:var(--sans)}
.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#0a0a0a;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-top:8px}
.btn-ghost{width:100%;background:none;border:1px solid var(--border);color:var(--muted);padding:12px;border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--sans);margin-top:8px}
.btn-sm{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red);color:var(--red);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}

/* SETUP */
.setup-container{max-width:440px;margin:0 auto;padding:40px 20px}
.logo-block{text-align:center;margin-bottom:36px}
.logo-block h1{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent)}
.logo-sub{color:var(--muted);font-size:14px;margin-top:4px}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
.setup-card label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;margin-top:14px;font-family:var(--mono)}
.setup-card input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--mono);outline:none}
.setup-card input:focus{border-color:var(--accent)}
.req{background:var(--accent-bg);color:var(--accent);font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}

/* MAIN */
.main-content{flex:1;overflow-y:auto;padding:0 0 80px}
.scan-section{padding:24px 20px 16px}
.mode-tabs{display:flex;gap:8px;margin-bottom:16px}
.mode-tab{flex:1;padding:12px;border-radius:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:700;border:2px solid var(--border);color:var(--muted);background:var(--card)}
.mode-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:0 20px 16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.section-header{padding:4px 20px 10px;font-size:12px;font-family:var(--mono);color:var(--muted)}

/* ITEM LIST */
.item-list{padding:0 20px}
.item-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.item-row:hover{border-color:var(--accent)}
.item-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--surface);flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.item-slot{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700}
.item-cat{font-size:11px;color:var(--muted)}
.slot-badge{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;flex-shrink:0}
.slot-small{background:var(--blue-bg);color:var(--blue)}
.slot-large{background:var(--orange-bg);color:var(--orange)}
.slot-bag{background:var(--green-bg);color:var(--green)}

/* PROCESSING */
#s-processing{background:var(--bg);justify-content:center;align-items:center}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT */
.result-content{flex:1;overflow-y:auto;padding:20px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.result-name{font-size:18px;font-weight:700;margin-bottom:8px}
.slot-display{background:var(--accent-dim);border:2px solid var(--accent);border-radius:14px;padding:20px;margin-bottom:20px;text-align:center}
.slot-main{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--accent)}
.slot-type{font-size:12px;color:var(--muted);margin-top:4px}
.tag{display:inline-block;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:4px;font-family:var(--mono);margin:2px}

/* SEARCH */
.search-bar{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0 14px;gap:8px;margin:0 20px 16px}
.search-bar input{flex:1;background:none;border:none;color:var(--text);padding:12px 0;font-size:14px;outline:none}

/* DRAWER MAP */
.drawer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px;padding:0 20px}
.drawer-cell{width:100%;aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--muted);cursor:pointer}
.drawer-cell.has-items{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.drawer-cell.full{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* SYNC BAR */
.sync-bar{padding:4px 20px 12px;font-size:12px}
.sync-bar-inner{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:var(--green)}.sync-dot.offline{background:var(--red)}
.sync-info{flex:1;color:var(--muted);font-family:var(--mono);font-size:11px}
.sync-btn{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--sans);white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}.modal-overlay.hidden{display:none}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:80vh;overflow-y:auto}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-name{font-size:18px;font-weight:700;margin-bottom:4px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.modal-key{color:var(--muted)}.modal-val{font-family:var(--mono);font-weight:700;color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0a0a;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="s-setup" class="screen">
<div class="setup-container">
  <div class="logo-block">
    <div style="font-size:48px;margin-bottom:8px">🧱</div>
    <h1>BrickSort</h1>
    <p class="logo-sub">LEGO 零件智慧收納系統</p>
  </div>
  <div class="setup-card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:8px">初始設定</h3>
    <label>Gemini API Key <span class="req">必填</span></label>
    <input type="password" id="inp-apikey" placeholder="AIzaSy..." autocomplete="off">
    <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="display:inline-block;margin-top:6px;font-size:12px;color:var(--accent);text-decoration:none">🔑 前往 Google AI Studio 取得 API Key →</a>
    <div style="margin-top:16px;padding:10px 14px;background:var(--green-bg);border:1px solid var(--green);border-radius:8px;font-size:12px;color:var(--green)">☁️ Firebase 多裝置同步已預設啟用<br><span style="color:var(--muted);font-size:11px">Project: storesmart-7ae65 · Collection: lego_parts</span></div>
    <button class="btn-primary" onclick="saveSetup()">開始使用</button>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--dim)">396 小抽屜 (a/b分格) · 12 大抽屜 · 收納袋</div>
</div>
</div>

<!-- MAIN SCREEN -->
<div id="s-main" class="screen">
<div class="header">
  <span class="header-title">🧱 BrickSort</span>
  <div style="display:flex;gap:8px">
    <button class="icon-btn" onclick="openDrawerMap()" title="抽屜地圖">⊞</button>
    <button class="icon-btn" onclick="openAllParts()" title="全部零件">☰</button>
    <button class="icon-btn" onclick="showScreen('s-setup')" title="設定">⚙</button>
  </div>
</div>
<div class="main-content">
  <div class="scan-section">
    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <div class="mode-tab active" id="tab-catalog" onclick="setMode('catalog')">📦 建檔模式</div>
      <div class="mode-tab" id="tab-storage" onclick="setMode('storage')">🔍 收納模式</div>
    </div>
    
    <input type="file" id="lens-input" accept="image/*" multiple style="display:none" onchange="handleLensInput(event)">
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleCameraInput(event)">
    
    <div id="mode-catalog-ui">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="btn-sm" style="flex:1;padding:14px;font-size:14px" onclick="document.getElementById('lens-input').click()">📷 Lens 截圖建檔</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0 12px">
        <span style="font-size:15px">🔍</span>
        <input type="text" id="part-id-input" placeholder="輸入零件編號（如 41677）…" style="flex:1;background:none;border:none;color:var(--text);padding:12px 0;font-size:14px;outline:none">
        <button onclick="handlePartIdInput()" style="background:var(--accent);color:#0a0a0a;border:none;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">查詢</button>
      </div>
    </div>
    
    <div id="mode-storage-ui" style="display:none">
      <button class="btn-sm" style="width:100%;padding:16px;font-size:15px;font-weight:700;background:var(--accent-dim);border-color:var(--accent);color:var(--accent)" onclick="document.getElementById('camera-input').click()">📷 拍照辨識零件 → 顯示收納位置</button>
      <div style="font-size:11px;color:var(--dim);margin-top:6px;text-align:center">拍攝 LEGO 零件，AI 辨識後顯示該零件的抽屜號碼</div>
    </div>
  </div>

  <div class="search-bar">
    <span style="color:var(--muted)">⌕</span>
    <input type="text" id="search-input" placeholder="搜尋零件、抽屜號…" onkeydown="if(event.key==='Enter')doSearch(this.value)">
    <button onclick="doSearch(document.getElementById('search-input').value)" style="background:var(--accent);color:#0a0a0a;border:none;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">搜尋</button>
  </div>

  <div id="stats-row" class="stats-row"></div>
  <div id="sync-status" class="sync-bar"></div>
  <div class="section-header">— 近期建檔</div>
  <div id="recent-list" class="item-list"></div>
</div>
</div>

<!-- PROCESSING -->
<div id="s-processing" class="screen">
<div style="text-align:center;padding:40px">
  <div class="spinner"></div>
  <p id="processing-msg" style="color:var(--muted);font-size:14px;font-family:var(--mono)">AI 辨識中...</p>
  <p id="processing-timer" style="color:var(--accent);font-family:var(--mono);font-size:13px;margin-top:8px"></p>
</div>
</div>

<!-- RESULT SCREEN -->
<div id="s-result" class="screen">
<div class="header">
  <button class="back-btn" onclick="cancelResult()">← 返回</button>
  <span class="header-title">辨識結果</span>
</div>
<div class="result-content">
  <div class="result-card">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <img id="result-img" src="" style="width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--surface)">
      <div style="flex:1">
        <div id="result-name" class="result-name"></div>
        <div id="result-designid" style="font-family:var(--mono);font-size:12px;color:var(--muted)"></div>
      </div>
    </div>
    <div id="result-desc" style="font-size:13px;color:var(--muted);margin-bottom:8px"></div>
    <div id="result-tags"></div>
    <div id="result-volume" style="margin-top:8px;font-size:12px;color:var(--muted);font-family:var(--mono)"></div>
  </div>
  <div id="match-banner" style="display:none;background:var(--green-bg);border:1px solid var(--green);border-radius:10px;padding:12px 14px;margin-bottom:12px"></div>
  <div class="slot-display">
    <div style="font-size:12px;color:var(--accent);font-family:var(--mono);margin-bottom:10px">收納位置</div>
    <div id="result-slot" class="slot-main"></div>
    <div id="result-slot-type" class="slot-type"></div>
  </div>
  <div id="result-size-select" style="display:none;margin-bottom:12px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px">此零件較大，請選擇收納方式：</div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm" style="flex:1;background:var(--orange-bg);border-color:var(--orange);color:var(--orange)" onclick="assignToLargeDrawer()">大抽屜 (L)</button>
      <button class="btn-sm" style="flex:1;background:var(--green-bg);border-color:var(--green);color:var(--green)" onclick="assignToBag()">收納袋 (B)</button>
    </div>
  </div>
  <button class="btn-primary" onclick="confirmPart()">✓ 確認儲存</button>
  <button class="btn-ghost" onclick="cancelResult()">取消</button>
</div>
</div>

<!-- SEARCH RESULTS -->
<div id="s-search" class="screen">
<div class="header">
  <button class="back-btn" onclick="showScreen('s-main')">← 返回</button>
  <span class="header-title" id="search-title">搜尋結果</span>
</div>
<div id="search-results" class="item-list" style="padding:16px 20px"></div>
</div>

<!-- ALL PARTS -->
<div id="s-allparts" class="screen">
<div class="header">
  <button class="back-btn" onclick="showScreen('s-main')">← 返回</button>
  <span class="header-title">全部零件</span>
</div>
<div id="allparts-content" style="padding:16px 20px 80px"></div>
</div>

<!-- DRAWER MAP -->
<div id="s-drawers" class="screen">
<div class="header">
  <button class="back-btn" onclick="showScreen('s-main')">← 返回</button>
  <span class="header-title">抽屜地圖</span>
</div>
<div id="drawers-content" style="padding:16px 20px 80px"></div>
</div>

<!-- DETAIL MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
<div class="modal-sheet" onclick="event.stopPropagation()">
  <div class="modal-drag"></div>
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
    <img id="modal-img" src="" style="width:80px;height:80px;border-radius:10px;object-fit:cover;background:var(--surface)">
    <div style="flex:1"><div id="modal-name" class="modal-name"></div><div id="modal-designid" style="font-family:var(--mono);font-size:12px;color:var(--muted)"></div></div>
  </div>
  <div id="modal-rows"></div>
  <div style="display:flex;gap:8px;margin-top:16px">
    <button class="btn-sm" onclick="closeModalPanel()">關閉</button>
    <button class="btn-sm" id="modal-full-btn" onclick="toggleFull()">標記已滿</button>
    <button class="btn-danger" id="modal-delete-btn">刪除</button>
  </div>
</div>
</div>


<div id="s-batch" class="screen">
<div class="header">
  <button class="back-btn" id="batch-back-btn" onclick="cancelBatch()">✕ 取消</button>
  <span class="header-title">批次建檔</span>
</div>
<div style="padding:16px 20px 80px;flex:1;overflow-y:auto">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span id="batch-status-text" style="font-size:14px;font-weight:500"></span>
      <span id="batch-count-badge" style="font-family:var(--mono);font-size:13px;color:var(--accent)"></span>
    </div>
    <div style="background:var(--surface);border-radius:4px;height:6px;overflow:hidden">
      <div id="batch-progress-bar" style="height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width .4s"></div>
    </div>
  </div>
  <div id="batch-item-list"></div>
  <div id="batch-done-panel" style="display:none">
    <div style="text-align:center;padding:16px 0 24px">
      <div style="font-size:36px;margin-bottom:8px" id="batch-done-icon">✓</div>
      <div id="batch-done-text" style="font-size:16px;font-weight:700"></div>
      <div id="batch-done-sub" style="font-size:13px;color:var(--muted);margin-top:4px"></div>
    </div>
    <button class="btn-primary" onclick="showScreen('s-main');refreshMain()">返回主畫面</button>
  </div>
</div>
</div>
<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const STORAGE_KEY = 'bricksort_cfg';
const ITEMS_KEY = 'bricksort_items';
const DEFAULT_FB = { fbProject:'storesmart-7ae65', fbApiKey:'AIzaSyDZltB8OQti4ZPkME-K95HXZL51oByXE10', fbCol:'lego_parts' };

// LEGO 零件外型標準標籤（不含顏色，只描述形狀/類型）
// BrickLink 官方分類作為特徵標籤（排除 Decorated/Promotional 變體）
// 參考：https://www.bricklink.com/catalogTree.asp?itemType=P
const LEGO_TAGS = 'Arch,Bar,Baseplate,Boat,Bracket,Brick,Brick Modified,Brick Round,Cone,Container,Cylinder,Dish,Door,Door Frame,Fence,Flag,Hinge,Hook,Hose,Ladder,Panel,Plant,Plate,Plate Modified,Plate Round,Projectile,Propeller,Rock,Roof,Slope,Slope Curved,Slope Inverted,Stairs,Support,Tail,Tap,Technic,Technic Axle,Technic Connector,Technic Gear,Technic Liftarm,Technic Link,Technic Panel,Technic Pin,Technic Plate,Tile,Tile Modified,Tile Round,Train,Turntable,Vehicle,Vehicle Base,Vehicle Mudguard,Wedge,Wedge Plate,Wheel,Wheel Tire,Window,Window Glass,Windscreen,Wing,Minifigure Utensil,Minifigure Weapon,Animal,Food,String Net,Human Tool,Riding Cycle,Motor,Pneumatic,Spring';


// BrickLink 分類分層系統（參考 brickarchitect.com/parts/most-common）
// Tier 1: 高頻結構零件 → 每個分類獨立格子
// Tier 2: 中頻零件 → 相關分類共用格子群

const CATEGORY_GROUPS = {
  // Tier 1: 獨立格子（前 250 常用零件幾乎都在這裡）
  'Plate': 'Plate', 'Plate Modified': 'Plate Modified', 'Plate Round': 'Plate Round',

  'Tile': 'Tile', 'Tile Modified': 'Tile Modified', 'Tile Round': 'Tile Round',
  'Slope': 'Slope', 'Slope Curved': 'Slope Curved', 'Slope Inverted': 'Slope Inverted',
  'Technic': 'Technic', 'Technic Axle': 'Technic Axle', 'Technic Pin': 'Technic Pin',
  'Technic Connector': 'Technic Connector', 'Technic Gear': 'Technic Gear',
  'Technic Liftarm': 'Technic Liftarm', 'Technic Link': 'Technic Link',
  'Technic Panel': 'Technic Panel', 'Technic Plate': 'Technic Plate',
  'Bracket': 'Bracket', 'Hinge': 'Hinge', 'Arch': 'Arch', 'Bar': 'Bar',
  'Wedge': 'Wedge', 'Wedge Plate': 'Wedge Plate', 'Wing': 'Wing',
  'Cone': 'Cone', 'Cylinder': 'Cylinder', 'Dish': 'Dish',

  'Vehicle': '車輛類', 'Vehicle Base': '車輛類', 'Vehicle Mudguard': '車輛類',
  'Wheel': '輪子類', 'Wheel Tire': '輪子類',
  'Train': '軌道類', 'Turntable': '軌道類',

  // Tier 3: 低頻裝飾零件 → 共用格子（節省空間）
  'Minifigure Utensil': '人偶配件', 'Minifigure Weapon': '人偶配件',
  'Animal': '生物自然', 'Food': '生物自然', 'Plant': '生物自然',
  'Flag': '小型配件', 'Hook': '小型配件', 'Tap': '小型配件',

// BrickLink 分類中「必定大型」→ 自動進收納袋（不需 AI 估算）
const ALWAYS_BAG_CATEGORIES = new Set([
  'Baseplate', 'Baseplate Raised', 'Baseplate Road',
  'Vehicle Base', 'Large Figure Part',
  'Boat', 'Train',           // 底板、船身、軌道底座
]);

// 判斷是否為「必定大型」分類
function isCategoryAlwaysBag(tags) {
  return (tags||[]).some(t => ALWAYS_BAG_CATEGORIES.has(t));
}


// 去掉 BrickLink 印刷/顏色後綴，取得基本外型編號
// 50943pb09 → 50943, 3068bpb0001 → 3068b, 973pr0001 → 973, 3626cpat0001 → 3626c
function getBaseDesignId(id) {
  if (!id) return '';
  return id.replace(/(pb|pr|pat)\d+.*$/i, '').trim();
}

// 取得分類的分組名（用於 slot 配對）
function getCategoryGroup(tags) {
  if (!tags || !tags.length) return null;
  for (const tag of tags) {
    if (CATEGORY_GROUPS[tag]) return CATEGORY_GROUPS[tag];
  }
  return tags[0] || null;
}

const SMALL_DRAWERS = 396;      // 1~396, 各有 a/b 兩格
const SMALL_SLOT_ML = 150;      // 每格 150cc
const LARGE_DRAWERS = 12;       // L1~L12
const LARGE_DRAWER_ML = 600;    // 每個 600cc

// Gemini model fallback
const GEMINI_MODELS = ['gemini-2.5-flash', 'gemini-3-flash-preview', 'gemini-3.1-flash-lite-preview'];
let _lastWorkingModel = null;

let cfg = {}, db = null, pendingPart = null, currentImageData = null, currentMode = 'catalog';

// ══════════════════════════════════════════════
// GEMINI API (with fallback + timing)
// ══════════════════════════════════════════════
async function callGeminiAPI(prompt, base64Image = null, _retryIdx = 0) {
  let model = (_retryIdx === 0 && _lastWorkingModel) ? _lastWorkingModel : (GEMINI_MODELS[_retryIdx] || GEMINI_MODELS[0]);
  const parts = [{ text: prompt }];
  if (base64Image) parts.push({ inlineData: { mimeType:'image/jpeg', data:base64Image } });
  const _t = performance.now();
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.apiKey}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contents:[{parts}], generationConfig:{ responseMimeType:"application/json" } })
  });
  if (resp.status === 503) {
    _lastWorkingModel = null;
    const curIdx = GEMINI_MODELS.indexOf(model);
    const nextIdx = curIdx >= 0 ? curIdx + 1 : _retryIdx + 1;
    if (nextIdx < GEMINI_MODELS.length) {
      const next = GEMINI_MODELS[nextIdx];
      console.log('[FALLBACK] ' + model + ' → ' + next);
      setProcessingMsg(model + ' 過載，切換 ' + next + '...');
      return callGeminiAPI(prompt, base64Image, nextIdx);
    }
  }
  if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(`Gemini ${resp.status}: ${e?.error?.message||''}`); }
  _lastWorkingModel = model;
  const data = await resp.json();
  console.log('[TIMING] ' + model + ': ' + Math.round(performance.now()-_t) + 'ms');
  return data.candidates[0].content.parts[0].text;
}

// INIT / SETUP
// ══════════════════════════════════════════════
function init() {
  if (typeof firebase === 'undefined') {
    let w=0; const p=setInterval(()=>{w+=100;if(typeof firebase!=='undefined'||w>=3000){clearInterval(p);_init();}},100);
  } else _init();
}
function _init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    cfg = JSON.parse(saved);
    if (!cfg.fbProject) { cfg = {...cfg, ...DEFAULT_FB}; localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }
    if (cfg.apiKey) { initFirebase(); showScreen('s-main'); refreshMain(); return; }
  }
  showScreen('s-setup');
}
function initFirebase() {
  if (!cfg.fbProject || !cfg.fbApiKey) return;
  if (typeof firebase === 'undefined') { console.warn('Firebase SDK not loaded'); return; }
  try { db = firebase.app('bricksort').firestore(); }
  catch(e) { try { db = firebase.initializeApp({apiKey:cfg.fbApiKey,projectId:cfg.fbProject},'bricksort').firestore(); } catch(e2) { console.warn('Firebase failed',e2); } }
}
function saveSetup() {
  const apiKey = document.getElementById('inp-apikey').value.trim();
  if (!apiKey) { alert('請輸入 Gemini API Key'); return; }
  cfg = { apiKey, provider:'gemini', ...DEFAULT_FB };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  initFirebase(); showScreen('s-main'); refreshMain();
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active'); window.scrollTo(0,0);
  if (id !== 's-processing' && window._procTimer) { clearInterval(window._procTimer); window._procTimer=null; const el=document.getElementById('processing-timer'); if(el) el.textContent=''; }
}
function setProcessingMsg(msg) {
  document.getElementById('processing-msg').textContent = msg;
  if (!window._procTimer) { window._procStart=performance.now(); window._procTimer=setInterval(()=>{ const el=document.getElementById('processing-timer'); if(el&&window._procStart) el.textContent='⏱ '+((performance.now()-window._procStart)/1000).toFixed(1)+'s';},100); }
}
function showToast(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.style.background=type==='error'?'var(--red)':'var(--green)'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

async function loadItems() {
  if (db) { try { const snap=await db.collection(cfg.fbCol||'lego_parts').orderBy('createdAt','desc').get(); return snap.docs.map(d=>({id:d.id,...d.data()})); } catch(e) { console.warn('Firestore read failed',e); } }
  return JSON.parse(localStorage.getItem(ITEMS_KEY)||'[]');
}
async function saveItem(item) {
  if (db) await db.collection(cfg.fbCol||'lego_parts').doc(item.id).set(item);
  const items=JSON.parse(localStorage.getItem(ITEMS_KEY)||'[]'); items.unshift(item); localStorage.setItem(ITEMS_KEY,JSON.stringify(items));
}
async function updateItem(item) {
  if (db) await db.collection(cfg.fbCol||'lego_parts').doc(item.id).set(item,{merge:true});
  let items=JSON.parse(localStorage.getItem(ITEMS_KEY)||'[]'); const idx=items.findIndex(i=>i.id===item.id);
  if(idx>=0) items[idx]=item; else items.unshift(item); localStorage.setItem(ITEMS_KEY,JSON.stringify(items));
}
async function deleteItem(id) {
  if (db) await db.collection(cfg.fbCol||'lego_parts').doc(id).delete();
  let items=JSON.parse(localStorage.getItem(ITEMS_KEY)||'[]'); items=items.filter(i=>i.id!==id); localStorage.setItem(ITEMS_KEY,JSON.stringify(items));
}

function partRowHTML(item) {
  const thumbSrc = item.thumbnailUrl || item.imageData || '';
  const blUrl = item.designId ? 'https://img.bricklink.com/ItemImage/PN/11/' + item.designId + '.png' : '';
  const fbUrl = item.imageData || '';
  const thumb = thumbSrc ? `<img class="item-thumb" src="${thumbSrc}" loading="lazy" data-bl="${blUrl}" data-fb="${fbUrl}" onerror="if(this.dataset.bl&&this.src!==this.dataset.bl){this.src=this.dataset.bl}else if(this.dataset.fb){this.src=this.dataset.fb}else{this.style.display='none'}">` : '<div style="width:44px;height:44px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px">🧱</div>';
  const slotClass = item.slotType==='large' ? 'slot-large' : item.slotType==='bag' ? 'slot-bag' : 'slot-small';
  return `<div class="item-row" onclick="openPartDetail('${item.id}')">
    ${thumb}
    <div class="item-info"><div class="item-name">${item.name||item.nameCN||'未知零件'}</div>
    <div class="item-meta"><span class="item-slot">${item.slot||'?'}</span><span class="item-cat">${(item.featureTags||[]).slice(0,2).join(', ')}</span></div></div>
    <span class="slot-badge ${slotClass}">${item.slot||'?'}</span>
  </div>`;
}

// LENS SCREENSHOT MODE (建檔)
// ══════════════════════════════════════════════
async function handleLensInput(event) {
  const files = Array.from(event.target.files || []); event.target.value='';
  if (!files.length) return;
  if (files.length === 1) {
    const reader = new FileReader();
    reader.onload = async(e) => { await parseLensScreenshot(e.target.result); };
    reader.readAsDataURL(files[0]); return;
  }
  await startBatch(files);
}

async function parseLensScreenshot(dataUrl) {
  showScreen('s-processing'); setProcessingMsg('解析 Lens 截圖...');
  try {
    const _t0 = performance.now();
    // Resize for speed
    const resized = await resizeImage(dataUrl, 800);
    const base64 = resized.split(',')[1];
    currentImageData = await cropLensThumb(dataUrl);

    const existingList = await buildExistingList();
    const prompt = `讀取截圖中的積木零件（LEGO或相容品牌如CaDA/森寶/宇星）。若能辨識LEGO等效編號則填入design_id，否則留空。
回應純JSON：{"design_id":"零件編號","name":"英文名","name_cn":"中文名","bricklink_category":"BrickLink分類(如Slope,Plate Modified,Technic Pin)","description":"30字描述","feature_tags":["1~3個BrickLink分類,限選:${LEGO_TAGS}"],"estimate_volume_ml":數字,"is_oversize":bool,"length_cm":數字,"matched_existing_id":"同外型零件id或null。已有:${existingList}"}`;

    setProcessingMsg('AI 辨識中...');
    const textResp = await callGeminiAPI(prompt, base64);
    const item = safeParseJSON(textResp);

    console.log('[TIMING] Lens total: ' + Math.round(performance.now()-_t0) + 'ms');
    await processResult(item);
  } catch(err) {
    showScreen('s-main'); showToast('解析失敗：'+err.message,'error');
  }
}

// ══════════════════════════════════════════════
// PROCESS RESULT → ASSIGN SLOT
// ══════════════════════════════════════════════
async function processResult(item) {
  setProcessingMsg('分配收納位置...');
  const allItems = await loadItems();

  // Check for duplicate (AI match or string match)
  let match = null;
  if (item.matched_existing_id && item.matched_existing_id !== 'null') {
    match = allItems.find(i => i.id === item.matched_existing_id);
  }
  if (!match) {
    const did = (item.design_id||'').toLowerCase();
    if (did) match = allItems.find(i => (i.designId||'').toLowerCase() === did);
  }
  if (!match) {
    const baseDid = getBaseDesignId(item.design_id);
    if (baseDid) match = allItems.find(i => getBaseDesignId(i.designId) === baseDid);
  }
  if (!match) {
    // Fallback: match by name similarity (handles CaDA/third-party without design_id)
    const newName = (item.name_cn || item.name || '').toLowerCase();
    if (newName.length >= 2) match = allItems.find(i => {
      const oldName = (i.nameCN || i.name || '').toLowerCase();
      return oldName.length >= 2 && (oldName.includes(newName) || newName.includes(oldName));
    });
  }

  // Get thumbnail from Rebrickable/Bricklink
  const designId = item.design_id || '';
  const thumbnailUrl = designId ? `https://cdn.rebrickable.com/media/parts/ldraw/7/${designId}.png` : '';

  // Determine slot type
  const vol = parseInt(item.estimate_volume_ml) || 2;
  const categoryBag = isCategoryAlwaysBag(item.feature_tags);
  const isOversize = categoryBag || item.is_oversize || vol > OVERSIZE_ML || (item.length_cm && item.length_cm > 7);

  let slotInfo;
  if (match) {
    // Same shape → same slot
    slotInfo = { slot: match.slot, slotType: match.slotType || 'small' };
  } else if (isOversize) {
    // Oversize → bag
    slotInfo = assignBag(item.feature_tags || [], allItems);
  } else {
    // Normal → small drawer
    slotInfo = assignSmallSlot(item.feature_tags || [], allItems);
  }

  pendingPart = {
    ...item, ...slotInfo,
    designId, thumbnailUrl,
    featureTags: item.feature_tags || [],
    bricklinkCategory: item.bricklink_category || '',
    estimateVolumeMl: vol,
    imageData: currentImageData || '',
    nameCN: item.name_cn || '',
    isUpdate: !!match,
    matchedId: match ? match.id : null,
  };

  // Render result screen
  document.getElementById('result-img').src = thumbnailUrl || currentImageData || '';
  const rImg = document.getElementById('result-img');
  rImg.onerror = function() { if (designId && this.src.includes('rebrickable')) { this.src = 'https://img.bricklink.com/ItemImage/PN/11/' + designId + '.png'; } else if (currentImageData) { this.src = currentImageData; } };
  document.getElementById('result-name').textContent = item.name_cn || item.name || '未知零件';
  document.getElementById('result-designid').textContent = designId ? 'Design ID: ' + designId : '';
  document.getElementById('result-desc').textContent = item.description || '';
  document.getElementById('result-volume').textContent = `體積 ≈ ${vol}ml` + (item.length_cm ? ` · 長 ${item.length_cm}cm` : '');

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = (item.feature_tags||[]).map(t => `<span class="tag">${t}</span>`).join('');

  document.getElementById('result-slot').textContent = slotInfo.slot;
  const typeLabel = slotInfo.slotType==='large' ? '大抽屜' : slotInfo.slotType==='bag' ? '收納袋' : '小抽屜分格';
  document.getElementById('result-slot-type').textContent = typeLabel;

  // Show size select for oversize parts
  document.getElementById('result-size-select').style.display = isOversize && !match ? '' : 'none';

  // Show match banner
  const banner = document.getElementById('match-banner');
  if (match) {
    banner.style.display = 'block';
    banner.innerHTML = `<div style="font-size:13px;font-weight:700;color:var(--green)">✓ 找到相同外型零件</div><div style="font-size:12px;color:var(--muted)">「${match.name||match.nameCN}」已在 ${match.slot}</div>`;
  } else { banner.style.display = 'none'; }

  // Storage mode: show lookup result, not save form
  if (currentMode === 'storage') {
    if (match) {
      // Found! Show where to put it
      document.getElementById('result-slot').textContent = match.slot;
      const typeLabel = match.slotType==='large'?'大抽屜':match.slotType==='bag'?'收納袋':'小抽屜分格';
      document.getElementById('result-slot-type').textContent = typeLabel + '（已建檔，數量 ' + (match.quantity||1) + '）';

    }
  } else {

  }

  showScreen('s-result');
}

// ══════════════════════════════════════════════
// SLOT ASSIGNMENT
// ══════════════════════════════════════════════
function assignSmallSlot(tags, allItems) {
  const smallItems = allItems.filter(i => (i.slotType||'small') === 'small');
  if (smallItems.length === 0) return { slot: '1a', slotType: 'small' };

  // Step 1: 用 BrickLink 分類群組匹配（Tier 系統）
  const newGroup = getCategoryGroup(tags);
  const slotGroups = {};  // slot → Set of groups
  const slotTags = {};    // slot → Set of tags
  const slotFull = {};

  smallItems.forEach(i => {
    const s = i.slot || '1a';
    if (!slotTags[s]) { slotTags[s] = new Set(); slotGroups[s] = new Set(); }
    (i.featureTags||[]).forEach(t => slotTags[s].add(t.toLowerCase()));
    const g = getCategoryGroup(i.featureTags);
    if (g) slotGroups[s].add(g);
    if (i.isFull) slotFull[s] = true;
  });

  // Step 2: 優先找相同分組的格子（Tier 3 共用格子的關鍵）
  if (newGroup) {
    for (const [slot, groups] of Object.entries(slotGroups)) {
      if (slotFull[slot]) continue;
      if (groups.has(newGroup)) return { slot, slotType: 'small' };
    }
  }

  // Step 3: 找相似標籤的相鄰格
  const newTags = new Set((tags||[]).map(t=>t.toLowerCase()));
  let bestSlot = null, bestOverlap = 0;
  for (const [slot, stags] of Object.entries(slotTags)) {
    if (slotFull[slot]) continue;
    const overlap = [...newTags].filter(t => stags.has(t)).length;
    if (overlap > bestOverlap) { bestOverlap = overlap; bestSlot = slot; }
  }

  if (bestSlot && bestOverlap > 0) {
    const adjSlot = getAdjacentSlot(bestSlot, slotTags, slotFull);
    return { slot: adjSlot, slotType: 'small' };
  }

  // Step 4: 無匹配 → 下一個空格
  return { slot: getNextFreeSlot(slotTags, slotFull), slotType: 'small' };
}

function getAdjacentSlot(slot, slotTags, slotFull) {
  // Parse slot: "15a" → drawer 15, side "a"
  const m = slot.match(/^(\d+)([ab])$/);
  if (!m) return slot;
  const num = parseInt(m[1]), side = m[2];

  // Try same drawer other side
  const otherSide = side === 'a' ? num+'b' : num+'a';
  if (!slotTags[otherSide] && !slotFull[otherSide]) return otherSide;

  // Try next drawer
  for (let d = num; d <= SMALL_DRAWERS; d++) {
    for (const s of [d+'a', d+'b']) {
      if (!slotTags[s] && !slotFull[s]) return s;
    }
  }
  return (SMALL_DRAWERS + 1) + 'a'; // overflow
}

function getNextFreeSlot(slotTags, slotFull) {
  for (let d = 1; d <= SMALL_DRAWERS; d++) {
    for (const s of [d+'a', d+'b']) {
      if (!slotTags[s] && !slotFull[s]) return s;
    }
  }
  return 'FULL';
}

function assignBag(tags, allItems) {
  const bagItems = allItems.filter(i => i.slotType === 'bag');
  if (bagItems.length === 0) return { slot: 'B1', slotType: 'bag' };

  const newTags = new Set((tags||[]).map(t=>t.toLowerCase()));
  const bagTags = {}, bagFull = {};
  bagItems.forEach(i => {
    const b = i.slot || 'B1';
    if (!bagTags[b]) bagTags[b] = new Set();
    (i.featureTags||[]).forEach(t => bagTags[b].add(t.toLowerCase()));
    if (i.isFull) bagFull[b] = true;
  });

  // Find matching non-full bag
  for (const [bag, btags] of Object.entries(bagTags)) {
    if (bagFull[bag]) continue;
    const overlap = [...newTags].filter(t => btags.has(t)).length;
    if (overlap > 0) return { slot: bag, slotType: 'bag' };
  }

  // Next new bag
  const maxBag = Object.keys(bagTags).map(b => parseInt(b.replace('B',''))||0).reduce((a,b)=>Math.max(a,b),0);
  return { slot: 'B' + (maxBag + 1), slotType: 'bag' };
}

async function buildExistingList() {
  const items = await loadItems();
  if (!items.length) return '';
  const grouped = {};
  items.forEach(i => {
    const s = i.slot || '?';
    if (!grouped[s]) grouped[s] = [];
    if (grouped[s].length < 3) grouped[s].push('['+i.id+'] '+(i.designId||'')+' '+(i.nameCN||i.name)+'('+((i.featureTags||[]).join(','))+')');
  });
  let list = '';
  for (const [slot, arr] of Object.entries(grouped)) list += slot + ':' + arr.join(';') + '\n';
  return list;
}

async function resizeImage(dataUrl, maxDim) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg',0.85));
    };
    img.src = dataUrl;
  });
}

async function cropLensThumb(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const W=img.width, H=img.height;
      const cx=Math.floor(W*0.6), cy=Math.floor(H*0.1), cw=Math.floor(W*0.38), ch=Math.floor(H*0.25);
      const c=document.createElement('canvas'); c.width=cw; c.height=ch;
      c.getContext('2d').drawImage(img,cx,cy,cw,ch,0,0,cw,ch);
      resolve(c.toDataURL('image/jpeg',0.9));
    };
    img.src = dataUrl;
  });
}

function safeParseJSON(text) {
  text = text.replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim();
  try { return JSON.parse(text); } catch(e) {}
  const m = text.match(/\{[\s\S]*\}/); if(!m) throw new Error('No JSON found');
  try { return JSON.parse(m[0]); } catch(e) {}
  throw new Error('JSON parse failed');
}

  let up=0, skip=0;

}

// ══════════════════════════════════════════════
// BATCH LENS PROCESSING
// ══════════════════════════════════════════════
let batchQueue = [], batchRunning = false, batchCancelled = false;

async function startBatch(files) {
  batchCancelled = false; batchRunning = true;
  batchQueue = files.map((f, i) => ({ id: i, file: f, status: 'pending', result: null, error: null, name: f.name, dataUrl: null }));
  showScreen('s-batch');
  document.getElementById('batch-back-btn').textContent = '✕ 取消';
  document.getElementById('batch-done-panel').style.display = 'none';
  renderBatchList(); updateBatchProgress(0, files.length, null);

  await Promise.all(batchQueue.map(item => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = async(e) => { item.dataUrl = e.target.result; resolve(); };
    reader.readAsDataURL(item.file);
  })));
  renderBatchList();

  let done = 0, errors = 0;
  for (const item of batchQueue) {
    if (batchCancelled) break;
    item.status = 'processing'; renderBatchList();
    updateBatchProgress(done + errors, batchQueue.length, item);
    try {
      const _t0 = performance.now();
      const resized = await resizeImage(item.dataUrl, 800);
      const base64 = resized.split(',')[1];
      const thumb = await cropLensThumb(item.dataUrl);
      const existingList = await buildExistingList();
      const prompt = `讀取截圖中積木零件(LEGO或相容品牌),若能辨識LEGO等效編號填design_id否則留空,純JSON:{"design_id":"編號","name":"英文名","name_cn":"中文名","bricklink_category":"BrickLink分類(如Slope,Plate Modified,Technic Pin)","description":"30字","feature_tags":["1~3個BrickLink分類,限選:${LEGO_TAGS}"],"estimate_volume_ml":數字,"is_oversize":bool,"length_cm":數字,"matched_existing_id":"同外型id或null。已有:${existingList}"}`;
      const textResp = await callGeminiAPI(prompt, base64);
      const parsed = safeParseJSON(textResp);
      const designId = parsed.design_id || '';
      const thumbnailUrl = designId ? `https://cdn.rebrickable.com/media/parts/ldraw/7/${designId}.png` : '';
      const vol = parseInt(parsed.estimate_volume_ml) || 2;
      const categoryBag = isCategoryAlwaysBag(parsed.feature_tags);
      const isOversize = categoryBag || parsed.is_oversize || vol > OVERSIZE_ML;
      const allItems = await loadItems();
      let match = null;
      if (parsed.matched_existing_id && parsed.matched_existing_id !== 'null') match = allItems.find(i => i.id === parsed.matched_existing_id);
      if (!match && designId) match = allItems.find(i => (i.designId||'').toLowerCase() === designId.toLowerCase());
      if (!match && designId) { const baseDid = getBaseDesignId(designId); if (baseDid) match = allItems.find(i => getBaseDesignId(i.designId) === baseDid); }
      let slotInfo;
      if (match) slotInfo = { slot: match.slot, slotType: match.slotType || 'small' };
      else if (isOversize) slotInfo = assignBag(parsed.feature_tags || [], allItems);
      else slotInfo = assignSmallSlot(parsed.feature_tags || [], allItems);
      const now = Date.now();
      const savedItem = { name: parsed.name||'', nameCN: parsed.name_cn||'', designId, description: parsed.description||'', featureTags: parsed.feature_tags||[], estimateVolumeMl: vol, slot: slotInfo.slot, slotType: slotInfo.slotType||'small', thumbnailUrl, imageData: thumb||'', isFull: false, quantity: match ? (match.quantity||1)+1 : 1, id: match ? match.id : 'lego_'+now+'_'+Math.random().toString(36).slice(2,5), createdAt: match ? match.createdAt : now, updatedAt: now };
      if (match) await updateItem(savedItem); else await saveItem(savedItem);
      item.result = savedItem; item.status = 'done'; done++;
      console.log('[BATCH] item ' + (done+errors) + ': ' + Math.round(performance.now()-_t0) + 'ms -> ' + slotInfo.slot);
    } catch(err) { item.error = err.message; item.status = 'error'; errors++; }
    renderBatchList(); updateBatchProgress(done + errors, batchQueue.length, null);
    if (!batchCancelled) await new Promise(r => setTimeout(r, 300));
  }
  batchRunning = false;
  document.getElementById('batch-back-btn').textContent = '← 返回';
  document.getElementById('batch-done-panel').style.display = 'block';
  document.getElementById('batch-done-icon').textContent = errors === 0 ? '✓' : '⚠';
  document.getElementById('batch-done-text').textContent = batchCancelled ? '已取消' : '完成！共建檔 ' + done + ' 件';
  document.getElementById('batch-done-sub').textContent = errors > 0 ? '失敗 ' + errors + ' 件' : '所有零件已儲存';
}

function cancelBatch() { if (batchRunning) { batchCancelled = true; batchRunning = false; } showScreen('s-main'); refreshMain(); }
function updateBatchProgress(done, total, current) {
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('batch-progress-bar').style.width = pct + '%';
  document.getElementById('batch-count-badge').textContent = done + ' / ' + total;
  document.getElementById('batch-status-text').textContent = current ? '辨識中：' + current.file.name.slice(0,20) : done === total ? '全部完成' : '準備中...';
}
function renderBatchList() {
  document.getElementById('batch-item-list').innerHTML = batchQueue.map(item => {
    const icon = item.status==='pending' ? '<span style="color:var(--dim)">○</span>' : item.status==='processing' ? '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div>' : item.status==='done' ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>';
    const name = item.result ? (item.result.nameCN || item.result.name) : item.name;
    const meta = item.status==='done' ? item.result.slot+' '+(item.result.featureTags||[]).slice(0,2).join(',') : item.status==='error' ? (item.error||'').slice(0,30) : item.status==='processing' ? 'AI 辨識中...' : '等待中';
    const thumb = item.result?.thumbnailUrl || '';
    const thumbEl = thumb ? '<img style="width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--surface)" src="'+thumb+'">' : '<div style="width:36px;height:36px;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px">🧱</div>';
    return '<div style="background:var(--card);border:1px solid '+(item.status==='processing'?'var(--accent)':item.status==='done'?'var(--green)':item.status==='error'?'var(--red)':'var(--border)')+';border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">'+thumbEl+'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">'+meta+'</div></div><div style="width:22px;text-align:center">'+icon+'</div></div>';
  }).join('');
}


// ══════════════════════════════════════════════
// MANUAL ASSIGN TO LARGE DRAWER
// ══════════════════════════════════════════════
async function manualAssignLarge() {
  const partId = document.getElementById('manual-partid').value.trim();
  const drawer = document.getElementById('manual-drawer').value;
  if (!partId) { showToast('請輸入零件編號', 'error'); return; }

  const items = await loadItems();
  // Find by exact designId, or by base designId
  let item = items.find(i => (i.designId||'').toLowerCase() === partId.toLowerCase());
  if (!item) {
    const baseInput = getBaseDesignId(partId);
    if (baseInput) item = items.find(i => getBaseDesignId(i.designId) === baseInput);
  }
  // Also search by name
  if (!item) item = items.find(i => (i.nameCN||'').includes(partId) || (i.name||'').toLowerCase().includes(partId.toLowerCase()));

  if (!item) {
    showToast('找不到零件「' + partId + '」，請先建檔', 'error');
    return;
  }

  const oldSlot = item.slot;
  item.slot = drawer;
  item.slotType = 'large';
  await updateItem(item);
  document.getElementById('manual-partid').value = '';
  showToast((item.nameCN||item.name) + '：' + oldSlot + ' → ' + drawer);
  openDrawerMap(); // refresh
}

async function searchDrawer(num) {
  const items = await loadItems();
  const results = items.filter(i => {
    const s = (i.slot||'');
    return s === num+'a' || s === num+'b';
  });
  document.getElementById('search-title').textContent = '抽屜 ' + num + '（' + results.length + '筆）';
  let html = '';
  for (const side of ['a','b']) {
    const sideItems = results.filter(i => i.slot === num+side);
    html += '<div style="margin-bottom:12px">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="slot-badge slot-small" style="font-size:13px;padding:4px 10px">' + num + side + '</span><span style="font-size:12px;color:var(--muted)">' + sideItems.length + ' 件</span></div>';
    if (sideItems.length) { html += sideItems.map(partRowHTML).join(''); }
    else { html += '<div style="color:var(--dim);font-size:12px;padding:8px 12px">空</div>'; }
    html += '</div>';
  }
  document.getElementById('search-results').innerHTML = html;
  showScreen('s-search');
}
